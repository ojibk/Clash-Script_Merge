    path: "./ruleset/providers/anti-ad.mrs" # 存储路径。规则集文件命名与规则集声明键值解耦
    interval: 86400   # ⏱️ 更新间隔：86400 秒 = 24 小时（内核运行时按该周期后台定时拉取；重启后亦检测缓存是否过期并重新拉取）。上游规则集变动较频繁，设较短缓存周期以跟进更新。
