# 💡 DNS 说明：须声明 dns 节，如需对接外部纯 IP 订阅，确保订阅提供的外部配置含 fake-ip 或 redir-host，
# 否则域名规则精度下降。请确保最终合入的配置包含合适的 DNS 段落。
# DNS 分流与防污染分层设计：nameserver-policy（主动分流）+ nameserver（默认国内）+ fallback（兜底纠正），
# 在长尾国内域名 CDN 优化和境外防污染之间取得良好平衡，延迟翻倍的代价仅在长尾境外域名首次访问及每次缓存失效后出现，属于有意取舍。
# ============================================================
# 设计哲学：
#   1. 主动精准分流：geosite:cn 走国内明文，!cn 走境外 DoH
#   2. 长尾域名信任国内：nameserver 使用国内 DoH，保证国内小众网站 CDN 最优
#   3. 防污染兜底：当国内 DoH 返回境外 IP 时，通过 fallback 用境外 DoH 重查
#
# 💡 设计取舍说明：
#   - 长尾境外域名延迟翻倍：
#     未收录在 geosite:geolocation-!cn 中的境外域名，会先由国内 DoH 解析，
#     返回境外 IP 后触发 fallback 二次查询，首包延迟翻倍于直接走境外 DoH。
#     这是为了换取国内长尾域名 CDN 最优调度的结构性权衡。
#
#   - 国内 DoH 的轻微隐私暴露：
#     长尾域名会先向腾讯/阿里 DoH 发起一次加密查询，运营商看不到内容，
#     但服务商（腾讯/阿里）会在日志中留存查询记录。
#     若追求极致隐私，可将 nameserver 也改为境外 DoH。
#
#   - 强依赖代理节点：
#     geosite:geolocation-!cn 及 fallback 的 DoH 请求均走代理规则链。
#     若代理节点不可用，境外域名解析在本配置路由设计下将全部失败。
#     务必确保路由规则将 geolocation-!cn 和 DNS DoH 流量正确导向代理。
#
#   - DNS 引导查询：
#     default-nameserver 使用国内明文 DNS 解析 DoH 服务器 IP（doh.pub），
#     会留下极少量无害的引导记录，隐私风险极微，实际可忽略。
#
#   - 校园网/企业内网兼容性：
#     本配置的 fallback-filter 未包含 RFC 1918 私有地址段（10/8, 172.16/12, 192.168/16），
#     因此内网域名解析不会被误判为污染，校园网和企业内网环境可直接使用。
#     如需兼容公共域名被内网 DNS 解析到私有 IP 的特殊场景，
#     勿将私有段加入 ipcidr，否则内网域名每次 DNS 查询都将触发 fallback 重查；
#     境外 DoH 无内网解析能力，返回错误结果并覆盖内网 IP，导致内网服务不可用。
# ============================================================
