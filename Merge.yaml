# ============================================================
# Clash-Merge 全局扩展覆写配置 v260607
# 智能路由港区受限网络服务
# 静态规则链，支持独立运行。流程：订阅 → Merge → Script → CVR → Mihomo
# ⚠️ 严禁声明 mode 字段（CVR 独占，冲突崩溃）
# ============================================================
# ⚠️ TUN 依赖：sniffer.parse-pure-ip 要求 TUN 接管三层流量。
#    必须由 CVR 或主配置注入 tun: {enable: true, ...}，否则该选项静默无效。
#    示例 TUN 片段（仅供参照，勿直接取消注释，避免与 CVR 冲突）：
#    tun:
#      enable: true
#      stack: system
#      auto-redir: true
#      auto-route: true
#      dns-hijack: [any:53]

# ░░ 全局行为配置
find-process-mode: strict       # ⚙️ 进程信息获取：off/strict/always，进程规则依赖此项
geodata-mode: true              # ⚙️ GeoIP 数据库：true=dat (MetaCubeX)，统一归属判定
geo-auto-update: true           # ⚙️ 自动更新 geodata，关闭则停留在出厂版本
geo-update-interval: 168        # ⏱️ 更新间隔（小时），168=每周
geox-url:                       # ⚙️ geodata 下载地址（CF 加速），未声明时回退默认
  geoip:   "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  # mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb" # geodata-mode:true 时 mmdb 不参与查询，注释可省下载
  # asn:  "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb" # 预留，用于 GEOASN 规则

profile:
  store-selected: true          # ⚙️ 策略组选择持久化到 cache.db，防重启重置
  store-fake-ip: false          # ⚙️ Fake-IP 映射持久化，仅 fake-ip 模式有效。需配合外部 fake-ip 模式（如 CVR 注入 dns.enhanced-mode: fake-ip）才生效

# ░░ 嗅探器 — 纯 IP 连接命中域名规则的关键
sniffer:
  enable: true                  # ⚙️ 启用嗅探，提取域名供规则匹配
  force-dns-mapping: true       # ⚙️ 嗅探域名写入映射表，规则用域名而非 IP
  parse-pure-ip: true           # ⚙️ 纯 IP 也嗅探（需 TUN 模式）
  sniff:
    HTTP:
      ports: [80, 8080, 8880, 2052, 2082, 2086, 2095]    # HTTP + CF 备用端口
    TLS:
      ports: [443, 8443, 2053, 2083, 2087, 2096]        # HTTPS + CF 备用端口
    QUIC:
      ports: [443, 8443, 2053, 2083, 2087, 2096]        # QUIC (HTTP/3) 端口
  # override-destination: 默认不启用，启用可能导致绑定 IP 的服务异常
  # skip-domain: 未配置，IoT 设备域名误判时可在此排除

# ============================================================
# ░░ 策略组 (Proxy Groups) — 锚点组，rules 出口保障
# ============================================================
# Array 类型，声明即全量替换订阅策略组。
# include-all 引入所有出站节点（不含嵌套组），切换订阅免维护；若无裸节点则空组触发 Fail-Fast。
proxy-groups:
  - name: 🎛️ 动态选择 # 🛡️ 主出口，硬编码组名。修改组名须同步更新所有 rules 引用
    include-all: true # ⚙️ 继承所有出站节点
    type: url-test    # 自动延迟优选，IP 频繁变动可能触发风控
    interval: 600     # 健康检查间隔(秒)，控制节点变动频率
    tolerance: 50     # 切换容差(ms)，仅当延迟低超过 50ms 才切换
    lazy: true        # 惰性探测，按需触发健康检查
    url: http://www.gstatic.com/generate_204 # HTTP 测试链接，避免 TLS 开销
    # url: http://cp.cloudflare.com/generate_204 # 备用
    expected-status: 204 # 期望响应码，不符合认为不可用
    filter: '^(?!.*(剩余|到期|官网|套餐|重置|群|客服)).+$' # 排除流量/套餐信息等非代理节点

  - name: 🔀 绕港优选 # 🇭🇰 排除香港的优选组 (ChatGPT/Claude/TikTok 等)
    include-all: true # ⚙️ 继承所有出站节点
    type: url-test    # 自动延迟优选
    interval: 1800    # 健康检查间隔(秒)，半小时降低风控可能
    tolerance: 50     # 切换容差(ms)
    lazy: true        # 惰性探测
    url: http://www.gstatic.com/generate_204
    # url: http://cp.cloudflare.com/generate_204 # 备用
    expected-status: 204
    filter: '^(?i)(?!.*(香港|HK|Hong\s*Kong|🇭🇰))(?!.*(剩余|到期|官网|套餐|重置|群|客服)).+$' # 排除香港节点及非代理信息
    proxies:          # 🛡️ 兜底：过滤后无节点时降级到主出口
      - 🎛️ 动态选择

# ============================================================
# ░░ 规则集 (Rule Providers) — Map 合并，保留订阅条目
# ============================================================
# 静默容错：首次下载失败条目为 0，后续使用缓存。
# 全线 domain/ipcidr + MRS 格式，内存映射，启动快。
# 规则文件无内置策略，动作由 rules 段决定。
# ⚠️ 注释 provider 必须同步注释对应 RULE-SET；反之则不必。
rule-providers:
  # '':  # 若订阅有空键 '' ，Mihomo 报错 '' has unset fields。取消注释覆盖空条目

  private: # 🔓 私有/保留域名 (localhost/.local/router.asus.com 等)，DustinWin 构建 MRS
    type: http        # ℹ️ 远程 HTTP 资源
    behavior: domain  # ℹ️ 域名后缀匹配树
    format: mrs       # ℹ️ MRS 二进制直接映射
    path: "./ruleset/providers/private.mrs"
    interval: 604800  # ⏱️ 7天，低频变动
    url: "https://testingcf.jsdelivr.net/gh/DustinWin/ruleset_geodata@mihomo-ruleset/private.mrs"
    # url: "https://github.com/DustinWin/ruleset_geodata/raw/refs/heads/mihomo-ruleset/private.mrs" # 备用

  # lan-cidr: # 🔓 局域网私有 IP 段 (192.168/10/172等)，与 private 互补。MetaCubeX geoip/private
  #   type: http        # ℹ️ 远程 HTTP 资源
  #   behavior: ipcidr  # ℹ️ IP 网段前缀匹配树
  #   format: mrs
  #   path: "./ruleset/providers/lan-cidr.mrs" # 重命名避免 geosite/private 冲突
  #   interval: 604800
  #   url: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geoip/private.mrs"
  #   # url: "https://github.com/MetaCubeX/meta-rules-dat/raw/meta/geo/geoip/private.mrs" # 备用

  # advertising: # 🚫 广告域名 (Blackmatrix7 完整版，peiyingyao 构建 MRS)，备用
  #   type: http
  #   behavior: domain
  #   format: mrs
  #   path: "./ruleset/providers/advertising.mrs"
  #   interval: 86400   # 24小时
  #   url: "https://testingcf.jsdelivr.net/gh/peiyingyao/Rule-for-OCD@master/rule/Clash/Advertising/Advertising_OCD_Domain.mrs"
  #   # url: "https://github.com/peiyingyao/Rule-for-OCD/raw/refs/heads/master/rule/Clash/Advertising/Advertising_OCD_Domain.mrs" # 备用

  ads: # 🚫 综合拦截 (广告/跟踪/隐私/恶意/挖矿)，anti-AD 源，DustinWin 构建 MRS
    type: http
    behavior: domain
    format: mrs
    path: "./ruleset/providers/ads.mrs"
    interval: 86400   # 24小时，上游变动频繁
    url: "https://testingcf.jsdelivr.net/gh/DustinWin/ruleset_geodata@mihomo-ruleset/ads.mrs"
    # url: "https://github.com/DustinWin/ruleset_geodata/raw/refs/heads/mihomo-ruleset/ads.mrs" # 备用

  # threat: # 🚫 威胁域名 (EasyPrivacy 抽取，peiyingyao 构建 MRS)，备用
  #   type: http
  #   behavior: domain
  #   format: mrs
  #   path: "./ruleset/providers/threat.mrs"
  #   interval: 86400
  #   url: "https://testingcf.jsdelivr.net/gh/peiyingyao/Rule-for-OCD@master/rule/Clash/EasyPrivacy/EasyPrivacy_OCD_Domain.mrs"
  #   # url: "https://github.com/peiyingyao/Rule-for-OCD/raw/refs/heads/master/rule/Clash/EasyPrivacy/EasyPrivacy_OCD_Domain.mrs" # 备用

  cn: # 🔓 国内域名直连 (主流+长尾)，MetaCubeX geosite/cn，盲区由 GeoIP 补
    type: http
    behavior: domain
    format: mrs
    path: "./ruleset/providers/cn.mrs"
    interval: 86400   # 24小时
    url: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/cn.mrs"
    # url: "https://github.com/MetaCubeX/meta-rules-dat/raw/meta/geo/geosite/cn.mrs" # 备用

  non-cn: # 🛡️ 境外域名代理 (Google/GitHub/Telegram 等)，MetaCubeX geolocation-!cn
    type: http
    behavior: domain
    format: mrs
    path: "./ruleset/providers/non-cn.mrs"
    interval: 86400   # 24小时
    url: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/geolocation-!cn.mrs"
    # url: "https://github.com/MetaCubeX/meta-rules-dat/raw/meta/geo/geosite/geolocation-!cn.mrs" # 备用

  hk-restricted: # 🇭🇰 港区受限服务 (ChatGPT/Claude/Gemini/TikTok)
    type: http
    behavior: domain
    format: mrs
    path: "./ruleset/providers/hk-restricted.mrs"
    interval: 604800  # 7天，低频变动
    url: "https://testingcf.jsdelivr.net/gh/ojibk/rules@main/hk-restricted.mrs"
    # url: "https://raw.githubusercontent.com/ojibk/rules/main/hk-restricted.mrs" # 备用

  amazon: # 🔓 亚马逊购物域名 (不含 AWS)
    type: http
    behavior: domain
    format: mrs
    path: "./ruleset/providers/amazon.mrs"
    interval: 604800  # 7天
    url: "https://testingcf.jsdelivr.net/gh/ojibk/rules@main/amazon.mrs"
    # url: "https://raw.githubusercontent.com/ojibk/rules/main/amazon.mrs" # 备用

# ============================================================
# ░░ 路由规则 (Rules) — 全量替换，First-Match 即止
# ============================================================
# 顺序即优先级，MATCH 兜底不可省略。
rules:
  # ── 本地放行（绝对确定） ──
  - RULE-SET,private,DIRECT             # 🔓 私有/保留域名直连
  # - RULE-SET,lan-cidr,DIRECT,no-resolve # 🔓 局域网 IP 直连（需启用对应 provider）

  # ── 综合拦截 ──
  - RULE-SET,ads,REJECT                 # 🚫 综合拦截集拒绝
  # - RULE-SET,advertising,REJECT       # 🚫 广告域名拒绝（需启用）
  # - RULE-SET,threat,REJECT            # 🚫 威胁域名拒绝（需启用）

  # ── 域名分流（国内优先，规避 CDN 误判） ──
  - RULE-SET,cn,DIRECT                  # 🔓 国内域名直连
  - RULE-SET,hk-restricted,🔀 绕港优选  # 🇭🇰 港区受限服务走非港节点
  - RULE-SET,amazon,DIRECT              # 🔓 亚马逊购物直连
  - RULE-SET,non-cn,🎛️ 动态选择         # 🛡️ 境外域名代理

  # ── 归属地映射（统计性，弥补长尾盲区，存在 CDN/Anycast 误判风险） ──
  - GEOIP,PRIVATE,DIRECT,no-resolve     # 🔓 私有/保留 IP 直连（确定性集合）
  - GEOIP,CN,DIRECT,no-resolve          # 🔓 国内 IP 直连（统计性集合），no-resolve 禁止为纯域名连接发起 DNS

  # ── 无条件兜底 ──
  - MATCH,DIRECT                        # 🔓 兜底直连（国内为主场景）
  # - MATCH,🎛️ 动态选择                 # 🛡️ 兜底代理（Unknown→Proxy 立场）

# ============================================================
# 注释 emoji：🛡️防护 🚫拦截 🔓直连 ⚠️警告 ⚙️配置 ℹ️说明 🔍诊断 💡设计 ⏱️时间
# 维护：禁止行号/绝对坐标，标识符先声明后引用
# ============================================================
# 💡 DNS 说明：须声明 dns 节，或依赖订阅或 CVR 阶段注入。
#    若上游未配置 redir-host/fake-ip 或使用了明文 UDP，可能导致域名规则匹配精度下降。
#    请确保最终合入的配置包含合适的 DNS 段落。
# ============================================================